    <text x="529" y="255" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Python</text>
    <rect x="592" y="238" width="82" height="24" rx="12" fill="#8957E5"/>
    <text x="611" y="255" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Alert</text>
